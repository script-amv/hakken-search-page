        </form>

        <ol class="results-grid">
            <li class="anime-card">
                <img class="cover" src="https://s4.anilist.co/file/anilistcdn/media/anime/cover/large/bx182255-butzrqd4I0aC.jpg">
                <div class="details">
                    <h4 class="title">Sousou no Frieren 2ndddd Season</h4>
                    <div class="collapsible"><div class="u--cell"> <!-- add u--cell to treat all content as one cell and easily collapse it-->
                        <ul class="genres">
                            <li class="genre">Adventure</li>
                            <li class="genre">Drama</li>
                            <li class="genre">Fantasy</li>
                        </ul>
                        <div class="stats">
                            <span class="format pill">TV</span>
                            <span class="eps pill">10 Eps</span>
                            <span class="score pill">8.9</span>
                        </div></div>
                    </div>
                </div>
            </li>
        </ol>
    </main>



    <script>
        function updateTool() {
            toolbar.querySelectorAll('.tool').forEach(tool => {
                const value = tool.querySelector('.value');
                const input = tool.querySelector('input');
                tool.classList.toggle('chosen', !!value);
                tool.classList.toggle('hasInput', !!input.value);
            });
        }

        document.querySelectorAll('.tool').forEach(tool => {
            const input = tool.querySelector('input');
            const values = tool.querySelector('.values');

            input.addEventListener('input', updateTool);
            
            input.addEventListener('keydown', e => {
                if (e.key !== 'Enter' || !input.value.trim()) return;
                const value = document.createElement('span');
                value.className = 'value';
                value.textContent = input.value;
                values.appendChild(value);
                input.value = '';
                updateTool();
            });
        });

        const toolbar = document.querySelector('.toolbar');
        updateTool();
    </script>
</body>
</html>
