<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browse Anime</title>

    <link rel="stylesheet" href="./styles.css">
</head>
<body>
    <main>
        <form class="toolbar"> 
            <!-- glass for glass style, tool for js -->
            <div class="search glass tool">
                <svg class="icon"></svg>
                <div class="collapsible">
                    <input class="label" type="search" placeholder="Search">
                </div>
            </div>

            <div class="filter glass tool">
                <div class="values">
                    <span class="value">Action</span>
                    <span class="value">Drama</span>
                </div>
                <div class="collapsible"><input class="label" type="search" placeholder="Genre"></div>
            </div>
            <div class="filter glass tool">
                <div class="values">
                    <span class="value">2020</span>
                </div>
                <div class="collapsible"><input class="label" type="search" placeholder="Year"></div>
            </div>
            <div class="filter glass tool">
                <div class="values"></div>
                <div class="collapsible"><input class="label" type="search" placeholder="Season"></div>
            </div>
            <div class="filter glass tool">
                <div class="values"></div>
                <div class="collapsible"><input class="label" type="search" placeholder="Format"></div>
            </div>
        </form>

        <ol class="results-grid">
            <li class="anime-card">
                <img class="cover" src="https://s4.anilist.co/file/anilistcdn/media/anime/cover/large/bx182255-butzrqd4I0aC.jpg">
                <div class="details">
                    <h3 class="title">Sousou no Frieren 2nd Season</h3>
                    <div class="collapsible vertical">
                        <ul class="genres">
                            <li class="genre">Adventure</li>
                            <li class="genre">Drama</li>
                            <li class="genre">Fantasy</li>
                        </ul>
                        <div class="stats">
                            <span class="format pill">TV</span>
                            <span class="eps pill">10 Eps</span>
                            <span class="score pill">8.9</span>
                        </div>
                    </div>
                </div>
            </li>
        </ol>
    </main>



    <script>
        function updateTool() {
            toolbar.querySelectorAll('.tool').forEach(tool => {
                const value = tool.querySelector('.value');
                const input = tool.querySelector('input');
                tool.classList.toggle('chosen', !!value);
                tool.classList.toggle('hasInput', !!input.value);
            });
        }

        document.querySelectorAll('.tool').forEach(tool => {
            const input = tool.querySelector('input');
            const values = tool.querySelector('.values');

            input.addEventListener('input', updateTool);
            
            input.addEventListener('keydown', e => {
                if (e.key !== 'Enter' || !input.value.trim()) return;
                const value = document.createElement('span');
                value.className = 'value';
                value.textContent = input.value;
                values.appendChild(value);
                input.value = '';
                updateTool();
            });
        });

        const toolbar = document.querySelector('.toolbar');
        updateTool();
    </script>
</body>
</html>
