<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browse Anime</title>

    <link rel="stylesheet" href="./styles.css">
</head>
<body>
    <header>
        <nav class="nav">
            <a href="">Home</a>
            <a href="">Browse</a>
        </nav>
        <div class="logo">
            <img class="logo__mark">
            <span class="logo__wordname">Hakken</span>
        </div>
        <nav class="nav nav--right">
            <a class="btn" href="">Log in</a>
            <button class="btn">
                <img class="icon">
            </button>
        </nav>
    </header>
    <main>
        <form class="filter-toolbar">
            <div class="search">
                <img class="icon">
                <input class="input" type="search" placeholder="Search">
            </div>

            <div class="filters">
                <div class="filter">
                    <img class="icon">
                    <span class="label">Genre</span>
                    <span class="value">Action</span>
                    <input class="input" type="search" placeholder="Add">
                </div>
            </div>
            
            <div class="view-controls">
                <button class="view-control">
                    <img class="icon">
                    <span class="label">Layout</span>
                    <span class="value"></span>
                </button>
            </div>
        </form>
        <ol class="results-grid">
            <li class="anime-card">
                <img class="anime-card__cover" src="https://s4.anilist.co/file/anilistcdn/media/anime/cover/large/bx182255-butzrqd4I0aC.jpg">
                <span class="anime-card__title">Sousou no Frieren 2nd Season</span>
            </li>
        </ol>
    </main>
    <footer>
        <a href="https://github.com/script-amv/hakken-search-page" class="logo">
            <img class="mark">
            <span class="wordname"></span>
        </a>
        <div class="credits">
            <a href="https://github.com/script-amv">Dmitrii Shostak (script-amv)</a>
        </div>
        <nav class="nav">
            <ul class="nav__list">
                <li>About</li>
                <li>Terms & Privacy</li>
                <li>Contact</li>
            </ul>
        </nav>
    </footer>
</body>
</html>
