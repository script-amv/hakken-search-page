<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browse Anime</title>

    <link rel="stylesheet" href="./styles.css">
</head>
<body>
    <header>
        <nav class="nav">
            <a href="">Home</a>
            <a href="">Browse</a>
        </nav>
        <div class="logo">
            <img class="logo__mark">
            <span class="logo__wordname">Hakken</span>
        </div>
        <nav class="nav right">
            <a class="btn" href="">Log in</a>
            <button class="btn">
                <img class="icon">
            </button>
        </nav>
    </header>
    <main>
        <form class="toolbar">
            <div class="filter-pill">
                <div class="filter-content">
                    <span class="value">Action</span>
                    <div class="inner-pill"><div class="inner-content">
                        <input class="label" type="search" placeholder="Genre">
                    </div></div>
                </div>
            </div>
            <div class="filter-pill">
                <div class="filter-content">
                    <span class="value"></span>
                    <div class="inner-pill"><div class="inner-content">
                        <input class="label" type="search" placeholder="Year">
                    </div></div>
                </div>
            </div>
        </form>
        
        <ol class="results-grid">
            <li class="anime-card">
                <img class="anime-card__cover" src="https://s4.anilist.co/file/anilistcdn/media/anime/cover/large/bx182255-butzrqd4I0aC.jpg">
                <div class="anime-card__description">
                    <h3 class="anime-card__description--title">Sousou no Frieren 2nd Season</h3>
                    <div class="anime-card__description--info-container">
                        <p class="anime-card__description--info-content">Format TV<br>Episodes 10<br>Episode Duration 24 mins<br>Status Releasing<br>Start Date Jan 16, 2026<br>End Date Mar 27, 2026<br>Season Winter 2026</p>
                    </div>
                </div>
            </li>
        </ol>
    </main>
    <footer>
        <a href="https://github.com/script-amv/hakken-search-page" class="logo">
            <img class="mark">
            <span class="wordname">Github</span>
        </a>
        <a class="credits" href="https://github.com/script-amv">by Dmitrii Shostak</a>
        <nav class="nav right">
            <a href="">About</a>
            <a href="">Terms & Privacy</a>
            <a href="">Contact</a>
        </nav>
    </footer>
    <script>
        const toolbar = document.querySelector('.toolbar');
        toolbar.addEventListener('mouseenter', () => [toolbar, ...toolbar.querySelectorAll('*')].forEach(el => el.classList.add('toolbar-hover')));
        toolbar.addEventListener('mouseleave', () => [toolbar, ...toolbar.querySelectorAll('*')].forEach(el => el.classList.remove('toolbar-hover')));

        document.querySelectorAll('.filter-pill').forEach(pill => {
            if (pill.querySelector('.value')?.textContent.trim()) {
                [pill, ...pill.querySelectorAll('*')].forEach(el => el.classList.add('chosen'));
                pill.querySelectorAll('.label').forEach(el => el.classList.replace('label', 'input'));
            }

            pill.addEventListener('mouseenter', () => [pill, ...pill.querySelectorAll('*')].forEach(el => el.classList.add('filter-hover')));
            pill.addEventListener('mouseleave', () => [pill, ...pill.querySelectorAll('*')].forEach(el => el.classList.remove('filter-hover')));
        });
    </script>
</body>
</html>
