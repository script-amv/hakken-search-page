<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browse Anime</title>

    <link rel="stylesheet" href="./styles.css">
</head>
<body>
    <header>
        <nav class="nav">
            <a href="">Home</a>
            <a href="">Browse</a>
        </nav>
        <div class="logo">
            <img class="logo__mark">
            <span class="logo__wordname">Hakken</span>
        </div>
        <nav class="nav right">
            <a class="btn" href="">Log in</a>
            <button class="btn">
                <img class="icon">
            </button>
        </nav>
    </header>
    <main>
        <form class="filter-toolbar">
            <div class="search">
                <img class="icon">
                <input class="input" type="search" placeholder="Search">
            </div>

            <div class="filter">
                <span class="value">Action</span>
                <input class="label" type="search" placeholder="Genre">
            </div>
            <div class="filter">
                <span class="value"></span>
                <input class="label" type="search" placeholder="Year">
            </div>
            
            <div class="view-controls">
                <button class="view-control">
                    <img class="icon">
                    <span class="label">Layout</span>
                    <span class="value"></span>
                </button>
            </div>
        </form>
        <ol class="results-grid">
            <li class="anime-card">
                <img class="anime-card__cover" src="https://s4.anilist.co/file/anilistcdn/media/anime/cover/large/bx182255-butzrqd4I0aC.jpg">
                <h3 class="anime-card__title">Sousou no Frieren 2nd Season</h3>
            </li>
        </ol>
    </main>
    <footer>
        <a href="https://github.com/script-amv/hakken-search-page" class="logo">
            <img class="mark">
            <span class="wordname">Github</span>
        </a>
        <a class="credits" href="https://github.com/script-amv">by Dmitrii Shostak</a>
        <nav class="nav right">
            <a href="">About</a>
            <a href="">Terms & Privacy</a>
            <a href="">Contact</a>
        </nav>
    </footer>
    <script>
        const toolbar = document.querySelector('.filter-toolbar');
        const filters = document.querySelectorAll('.filter');

        // toolbar hover
        toolbar.addEventListener('mouseenter', () => {
            toolbar.querySelectorAll('*').forEach(el => el.classList.add('filter-toolbar-hover'));
            toolbar.classList.add('filter-toolbar-hover');
        });
        toolbar.addEventListener('mouseleave', () => {
            toolbar.querySelectorAll('*').forEach(el => el.classList.remove('filter-toolbar-hover'));
            toolbar.classList.remove('filter-toolbar-hover');
        });

        filters.forEach(filter => {
            // chosen state
            const value = filter.querySelector('.value');
            if (value?.textContent.trim()) {
                filter.classList.add('chosen');
                filter.querySelectorAll('*').forEach(el => el.classList.add('chosen'));
                
                filter.querySelectorAll('.label').forEach(el => {
                    el.classList.remove('label');
                    el.classList.add('input');
                });
            }

            // filter hover
            filter.addEventListener('mouseenter', () => {
                filter.classList.add('filter-hover');
                filter.querySelectorAll('*').forEach(el => el.classList.add('filter-hover'));
            });
            filter.addEventListener('mouseleave', () => {
                filter.classList.remove('filter-hover');
                filter.querySelectorAll('*').forEach(el => el.classList.remove('filter-hover'));
            });

            // individual child hover
            filter.querySelectorAll(':scope > *').forEach(child => {
                child.addEventListener('mouseenter', () => child.classList.add('hover'));
                child.addEventListener('mouseleave', () => child.classList.remove('hover'));
            });
        });
    </script>
</body>
</html>
